name: Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger
    inputs:
      build_desktop:
        description: 'Build Desktop (Windows, macOS, Linux)'
        required: false
        default: 'true'
        type: boolean
      build_android:
        description: 'Build Android APK'
        required: false
        default: 'true'
        type: boolean

jobs:
  # Initialize build and send initial message
  init-build:
    runs-on: ubuntu-latest
    outputs:
      message_id: ${{ steps.notify.outputs.message_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Send initial notification
        id: notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

          <blockquote><code>$COMMIT_MSG</code></blockquote>
          
          <b>Build Progress:</b>
          <code>[░░░░░░░░░░░░░░] 0%</code>
          
          📦 Windows: <code>⏳ Pending...</code>
          🍎 macOS: <code>⏳ Pending...</code>
          🐧 Linux: <code>⏳ Pending...</code>
          🤖 Android: <code>⏳ Pending...</code>
          
          <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
          
          RESPONSE=$(curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d parse_mode="HTML" \
            --data-urlencode "text=$MESSAGE" \
            -d disable_web_page_preview="true")
          
          MESSAGE_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
          echo "message_id=$MESSAGE_ID" >> $GITHUB_OUTPUT
          echo "Telegram Message ID: $MESSAGE_ID"

  # Desktop builds (Windows, macOS, Linux)
  release-desktop:
    needs: init-build
    if: github.event_name == 'push' || github.event.inputs.build_desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            name: 'macOS'
            emoji: '🍎'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux'
            emoji: '🐧'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'
            emoji: '📦'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Progress - Building
        if: matrix.platform != 'windows-latest'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            VERSION="${{ needs.init-build.outputs.version }}"
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

            <blockquote><code>$COMMIT_MSG</code></blockquote>
            
            <b>Build Progress:</b>
            <code>[▓▓░░░░░░░░░░░░] 15%</code>
            
            📦 Windows: <code>⏳ Building...</code>
            🍎 macOS: <code>⏳ Building...</code>
            🐧 Linux: <code>⏳ Building...</code>
            🤖 Android: <code>⏳ Pending...</code>
            
            <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
            
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID" \
              -d parse_mode="HTML" \
              --data-urlencode "text=$MESSAGE" \
              -d disable_web_page_preview="true"
          fi

      - name: Update Progress - Building (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            VERSION="${{ needs.init-build.outputs.version }}"
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

            <blockquote><code>$COMMIT_MSG</code></blockquote>
            
            <b>Build Progress:</b>
            <code>[▓▓░░░░░░░░░░░░] 15%</code>
            
            📦 Windows: <code>⏳ Building...</code>
            🍎 macOS: <code>⏳ Building...</code>
            🐧 Linux: <code>⏳ Building...</code>
            🤖 Android: <code>⏳ Pending...</code>
            
            <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
            
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID" \
              -d parse_mode="HTML" \
              --data-urlencode "text=$MESSAGE" \
              -d disable_web_page_preview="true"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Remove mold linker config (GitHub Actions)
        run: |
          if [ -f ".cargo/config.toml" ]; then
            # Backup original
            cp .cargo/config.toml .cargo/config.toml.bak
            # Remove mold linker lines
            sed -i.tmp '/fuse-ld=mold/d' .cargo/config.toml || true
            rm -f .cargo/config.toml.tmp
          fi

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        id: build
        continue-on-error: true
        run: |
          bun run tauri build ${{ matrix.args }} 2>&1 | tee build.log
          echo "build_status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Check build status
        if: steps.build.outputs.build_status != '0'
        run: exit 1

      - name: Upload Desktop artifacts
        if: steps.build.outputs.build_status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: kira-desktop-${{ matrix.platform }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

      - name: Send Desktop Build Error to Telegram
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          VERSION="${{ needs.init-build.outputs.version }}"
          PLATFORM="${{ matrix.name }}"
          EMOJI="${{ matrix.emoji }}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Create detailed error log
          echo "=== Kira $PLATFORM Build Failed ===" > build-error.txt
          echo "" >> build-error.txt
          echo "Platform: $PLATFORM" >> build-error.txt
          echo "Version: $VERSION" >> build-error.txt
          echo "Commit: ${{ github.sha }}" >> build-error.txt
          echo "Workflow: $WORKFLOW_URL" >> build-error.txt
          echo "" >> build-error.txt
          echo "=== Build Log (Last 500 lines) ===" >> build-error.txt
          echo "" >> build-error.txt
          
          # Get build log
          if [ -f "build.log" ]; then
            tail -n 500 build.log >> build-error.txt
          else
            echo "Build log not found" >> build-error.txt
          fi
          
          # Send error notification
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
            MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

            <blockquote><code>$COMMIT_MSG</code></blockquote>
            
            <b>Build Progress:</b>
            <code>[▓▓░░░░░░░░░░░░] 15%</code>
            
            📦 Windows: <code>⏳ Building...</code>
            🍎 macOS: <code>⏳ Building...</code>
            🐧 Linux: <code>⏳ Building...</code>
            🤖 Android: <code>⏳ Pending...</code>
            
            ❌ <b>$EMOJI $PLATFORM Build Failed!</b>
            
            <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
            
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID" \
              -d parse_mode="HTML" \
              --data-urlencode "text=$MESSAGE" \
              -d disable_web_page_preview="true"
          fi
          
          # Send error log file
          if [ -f "build-error.txt" ]; then
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F document=@"build-error.txt" \
              -F caption="❌ $EMOJI $PLATFORM Build Error Log"
          fi

  # Android build
  release-android:
    needs: init-build
    if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Progress - Android Building
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            VERSION="${{ needs.init-build.outputs.version }}"
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

            <blockquote><code>$COMMIT_MSG</code></blockquote>
            
            <b>Build Progress:</b>
            <code>[▓▓▓▓▓▓▓░░░░░░░] 50%</code>
            
            📦 Windows: <code>⏳ Building...</code>
            🍎 macOS: <code>⏳ Building...</code>
            🐧 Linux: <code>⏳ Building...</code>
            🤖 Android: <code>⏳ Building...</code>
            
            <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
            
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID" \
              -d parse_mode="HTML" \
              --data-urlencode "text=$MESSAGE" \
              -d disable_web_page_preview="true"
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android

      - name: Setup Android NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Cargo NDK
        run: cargo install cargo-ndk

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create keystore.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build Rust library for Android
        working-directory: kira-core
        run: |
          cargo ndk -t arm64-v8a -o ../android/app/src/main/jniLibs/arm64-v8a build --release

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android Release APK
        id: gradle-build
        continue-on-error: true
        working-directory: android
        run: |
          ./gradlew assembleRelease 2>&1 | tee gradle-build.log
          echo "gradle_status=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Check Gradle build status
        if: steps.gradle-build.outputs.gradle_status != '0'
        run: exit 1

      - name: Sign APK
        if: steps.gradle-build.outputs.gradle_status == '0'
        working-directory: android
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks app/release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/kira-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kira-android
          path: |
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f android/app/release.keystore
          rm -f android/keystore.properties

      - name: Send Android Build Error to Telegram
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          VERSION="${{ needs.init-build.outputs.version }}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Create detailed error log
          echo "=== Kira Android Build Failed ===" > build-error.txt
          echo "" >> build-error.txt
          echo "Platform: Android" >> build-error.txt
          echo "Version: $VERSION" >> build-error.txt
          echo "Commit: ${{ github.sha }}" >> build-error.txt
          echo "Workflow: $WORKFLOW_URL" >> build-error.txt
          echo "" >> build-error.txt
          echo "=== Gradle Build Log (Last 500 lines) ===" >> build-error.txt
          echo "" >> build-error.txt
          
          # Get gradle log
          if [ -f "android/gradle-build.log" ]; then
            tail -n 500 android/gradle-build.log >> build-error.txt
          else
            echo "Gradle log not found" >> build-error.txt
          fi
          
          # Also check for Rust build errors
          echo "" >> build-error.txt
          echo "=== Rust Build Errors (if any) ===" >> build-error.txt
          if [ -d "kira-core/target" ]; then
            find kira-core/target -name "*.log" -type f -exec tail -n 100 {} \; >> build-error.txt 2>/dev/null || true
          fi
          
          # Send error notification
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
            MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

            <blockquote><code>$COMMIT_MSG</code></blockquote>
            
            <b>Build Progress:</b>
            <code>[▓▓▓▓▓▓▓░░░░░░░] 50%</code>
            
            📦 Windows: <code>⏳ Building...</code>
            🍎 macOS: <code>⏳ Building...</code>
            🐧 Linux: <code>⏳ Building...</code>
            🤖 Android: <code>❌ Failed!</code>
            
            <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
            
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID" \
              -d parse_mode="HTML" \
              --data-urlencode "text=$MESSAGE" \
              -d disable_web_page_preview="true"
          fi
          
          # Send error log file
          if [ -f "build-error.txt" ]; then
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F document=@"build-error.txt" \
              -F caption="❌ 🤖 Android Build Error Log"
          fi

  # Final step: Send all artifacts to Telegram
  send-artifacts:
    needs: [init-build, release-desktop, release-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f

      - name: Update Progress - Complete
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            VERSION="${{ needs.init-build.outputs.version }}"
            COMMIT_MSG=$(git log -1 --pretty=format:"%s")
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

            <blockquote><code>$COMMIT_MSG</code></blockquote>
            
            <b>Build Progress:</b>
            <code>[▓▓▓▓▓▓▓▓▓▓▓▓▓▓] 100%</code>
            
            📦 Windows: <code>✅ Complete</code>
            🍎 macOS: <code>✅ Complete</code>
            🐧 Linux: <code>✅ Complete</code>
            🤖 Android: <code>✅ Complete</code>
            
            📥 <b>Uploading artifacts...</b>
            
            <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
            
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID" \
              -d parse_mode="HTML" \
              --data-urlencode "text=$MESSAGE" \
              -d disable_web_page_preview="true"
          fi

      - name: Send artifacts to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          VERSION="${{ needs.init-build.outputs.version }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Find all build artifacts
          WINDOWS_EXE=$(find artifacts -name "*.exe" -type f | head -1)
          MACOS_DMG=$(find artifacts -name "*.dmg" -type f | head -1)
          LINUX_DEB=$(find artifacts -name "*.deb" -type f | head -1)
          ANDROID_APK=$(find artifacts -name "*-signed.apk" -type f | head -1)
          
          # Get file sizes
          WIN_SIZE=$([ -f "$WINDOWS_EXE" ] && du -h "$WINDOWS_EXE" | cut -f1 || echo "N/A")
          MAC_SIZE=$([ -f "$MACOS_DMG" ] && du -h "$MACOS_DMG" | cut -f1 || echo "N/A")
          LIN_SIZE=$([ -f "$LINUX_DEB" ] && du -h "$LINUX_DEB" | cut -f1 || echo "N/A")
          AND_SIZE=$([ -f "$ANDROID_APK" ] && du -h "$ANDROID_APK" | cut -f1 || echo "N/A")
          
          CAPTION="🎉 <b>Kira $VERSION - Release Build Complete!</b>

          <blockquote><code>$COMMIT_MSG</code></blockquote>
          
          📦 <b>Build Artifacts:</b>
          📦 Windows: <code>$WIN_SIZE</code>
          🍎 macOS: <code>$MAC_SIZE</code>
          🐧 Linux: <code>$LIN_SIZE</code>
          🤖 Android: <code>$AND_SIZE</code>
          
          ✅ All builds successful!
          📥 Ready for distribution
          
          <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>
          
          #KiraRelease #MultiPlatform"
          
          # Send Android APK with main caption
          if [ -f "$ANDROID_APK" ]; then
            RESPONSE=$(curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F document=@"$ANDROID_APK" \
              -F parse_mode="HTML" \
              --form-string "caption=$CAPTION")
            
            FILE_MESSAGE_ID=$(echo "$RESPONSE" | grep -o '"message_id":[0-9]*' | head -1 | cut -d':' -f2)
            
            # Pin the message
            if [ -n "$FILE_MESSAGE_ID" ] && [ "$FILE_MESSAGE_ID" != "null" ]; then
              curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/pinChatMessage" \
                -d chat_id="$TELEGRAM_CHAT_ID" \
                -d message_id="$FILE_MESSAGE_ID" \
                -d disable_notification="true"
            fi
          fi
          
          # Send other platform files
          [ -f "$WINDOWS_EXE" ] && curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document=@"$WINDOWS_EXE" \
            -F caption="📦 Windows Installer"
          
          [ -f "$MACOS_DMG" ] && curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document=@"$MACOS_DMG" \
            -F caption="🍎 macOS DMG"
          
          [ -f "$LINUX_DEB" ] && curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document=@"$LINUX_DEB" \
            -F caption="🐧 Linux DEB Package"

      - name: Send Build Summary on Failure
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          VERSION="${{ needs.init-build.outputs.version }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Create comprehensive error summary
          echo "=== Kira Build Failed - Summary ===" > build-error-summary.txt
          echo "" >> build-error-summary.txt
          echo "Version: $VERSION" >> build-error-summary.txt
          echo "Commit: $COMMIT_MSG" >> build-error-summary.txt
          echo "Commit URL: $COMMIT_URL" >> build-error-summary.txt
          echo "Workflow URL: $WORKFLOW_URL" >> build-error-summary.txt
          echo "" >> build-error-summary.txt
          echo "=== Failed Jobs ===" >> build-error-summary.txt
          echo "" >> build-error-summary.txt
          echo "One or more build jobs failed." >> build-error-summary.txt
          echo "Check individual error logs for detailed information." >> build-error-summary.txt
          echo "" >> build-error-summary.txt
          echo "Individual error logs have been sent separately for each failed platform." >> build-error-summary.txt
          
          # Update progress message with failure
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            MESSAGE="🚀 <b>Kira $VERSION Release Build</b>

            <blockquote><code>$COMMIT_MSG</code></blockquote>
            
            <b>Build Status:</b>
            <code>[▓▓▓▓▓▓▓░░░░░░░] FAILED</code>
            
            ❌ <b>Build Failed!</b>
            Check error logs for details.
            
            <a href=\"$COMMIT_URL\">Commit</a> | <a href=\"$WORKFLOW_URL\">Workflow</a>"
            
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID" \
              -d parse_mode="HTML" \
              --data-urlencode "text=$MESSAGE" \
              -d disable_web_page_preview="true"
          fi
          
          # Send summary error log
          if [ -f "build-error-summary.txt" ]; then
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F document=@"build-error-summary.txt" \
              -F caption="❌ Build Failed - Summary"
          fi

      - name: Delete progress message
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_ID: ${{ needs.init-build.outputs.message_id }}
        run: |
          if [ -n "$MESSAGE_ID" ] && [ "$MESSAGE_ID" != "null" ]; then
            curl -s -X POST "https://botapi.arasea.dpdns.org/bot$TELEGRAM_BOT_TOKEN/deleteMessage" \
              -d chat_id="$TELEGRAM_CHAT_ID" \
              -d message_id="$MESSAGE_ID"
          fi
